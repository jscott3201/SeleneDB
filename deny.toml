[advisories]
ignore = [
    # paste is unmaintained but is a transitive dep of parquet -- no action we can take
    { id = "RUSTSEC-2024-0436", reason = "transitive dep via parquet, no alternative available" },
    # rsa timing sidechannel -- transitive dep via jsonwebtoken, no safe upgrade available yet
    { id = "RUSTSEC-2023-0071", reason = "transitive dep via jsonwebtoken, awaiting upstream fix" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
