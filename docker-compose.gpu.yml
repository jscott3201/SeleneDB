---
# SeleneDB GPU deployment with Tailscale mesh networking.
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed on host
#   - Tailscale auth key in TAILSCALE_AUTHKEY env var
#   - MCP secrets in environment (see selene.cloud.toml)
#
# Usage:
#   export TAILSCALE_AUTHKEY=tskey-auth-xxx
#   export SELENE_MCP_API_KEY=$(openssl rand -hex 32)
#   export SELENE_MCP_SIGNING_KEY=$(openssl rand -hex 64)
#   export SELENE_MCP_REGISTRATION_TOKEN=$(openssl rand -hex 32)
#   docker compose -f docker-compose.gpu.yml up -d

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: selene-gcp
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:server
    restart: unless-stopped

  selene:
    image: ${SELENE_IMAGE:-us-central1-docker.pkg.dev/cs-poc-3yawesacflnh7gct7rszujy/selene/selene-server:gpu-latest}
    depends_on:
      - tailscale
    network_mode: service:tailscale
    runtime: nvidia
    volumes:
      - selene-data:/data
      - ./selene.cloud.toml:/data/config.toml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SELENE_CUDA=1
      - SELENE_PROFILE=standalone
      - SELENE_MCP_ENABLED=true
      - SELENE_MCP_API_KEY=${SELENE_MCP_API_KEY}
      - SELENE_MCP_SIGNING_KEY=${SELENE_MCP_SIGNING_KEY}
      - SELENE_MCP_REGISTRATION_TOKEN=${SELENE_MCP_REGISTRATION_TOKEN}
      - SELENE_MCP_PUBLIC_URL=http://selene-gcp:8080
      - SELENE_MEMORY_BUDGET_MB=12288
      - RUST_LOG=selene_server=info,selene_gql=info
    command: ["--dev", "--config", "/data/config.toml", "--data-dir", "/data"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256m
    restart: unless-stopped

volumes:
  tailscale-state:
  selene-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/disks/selene-data
