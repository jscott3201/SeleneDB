name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml which sets -Ctarget-cpu=native (for local
  # Override only the CPU tuning from .cargo/config.toml in CI. This keeps
  # the shared lint configuration in one place while avoiding host-specific
  # instructions from -Ctarget-cpu=native on GitHub-hosted runners.
  CARGO_ENCODED_RUSTFLAGS: "-Ctarget-cpu=x86-64"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        # Exclude 'metal' feature on Linux (requires objc2 / Apple frameworks).
        run: cargo clippy --workspace --all-targets --features selene-server/dev-tls,selene-testing/bench -- -D warnings

  test:
    name: Test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /
      - name: Build tests
        # Compile test binaries with limited parallelism to avoid OOM on 7 GB runners.
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo nextest run --workspace --features selene-server/dev-tls,selene-testing/bench --no-run
      - name: Run tests
        # Nextest runs each test in its own process for isolation and parallelism.
        run: cargo nextest run --workspace --features selene-server/dev-tls,selene-testing/bench --profile ci
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
      - name: Doctests
        # Nextest does not run doctests, so run them separately.
        # Limited build parallelism to avoid OOM on 7 GB runners.
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo test --workspace --features selene-server/dev-tls,selene-testing/bench --doc

  doc-audit:
    name: Docs & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        # Exclude 'metal' feature (requires macOS / objc2).
        run: cargo doc --workspace --no-deps --features selene-server/dev-tls,selene-testing/bench
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Security audit
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.0 --locked
      - name: License and advisory check
        run: cargo deny check

  # Docker snapshot builds moved to .github/workflows/snapshot.yml
  # (workflow_dispatch). Trigger manually when a dev image is needed.
