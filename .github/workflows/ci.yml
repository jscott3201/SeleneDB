name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml which sets -Ctarget-cpu=native (for local
  # Apple Silicon builds). CI runners are x86_64 and would SIGILL on
  # host-specific instructions. Keep clippy lints but drop target-cpu.
  CARGO_ENCODED_RUSTFLAGS: "-Wclippy::all\x1f-Wclippy::pedantic\x1f-Aclippy::module_name_repetitions\x1f-Aclippy::must_use_candidate\x1f-Aclippy::missing_errors_doc\x1f-Aclippy::missing_panics_doc\x1f-Aclippy::cast_possible_truncation\x1f-Aclippy::cast_sign_loss\x1f-Aclippy::cast_precision_loss\x1f-Aclippy::cast_possible_wrap\x1f-Aclippy::redundant_pub_crate\x1f-Aclippy::doc_markdown\x1f-Aclippy::many_single_char_names\x1f-Aclippy::items_after_statements\x1f-Aclippy::missing_fields_in_debug\x1f-Aclippy::redundant_closure_for_method_calls\x1f-Aclippy::single_char_pattern\x1f-Aclippy::ignored_unit_patterns\x1f-Aclippy::needless_pass_by_value\x1f-Aclippy::similar_names\x1f-Aclippy::too_many_lines\x1f-Aclippy::match_same_arms\x1f-Aclippy::wildcard_enum_match_arm\x1f-Aclippy::float_cmp\x1f-Aclippy::approx_constant\x1f-Aclippy::unused_async\x1f-Aclippy::used_underscore_binding\x1f-Aclippy::while_let_loop\x1f-Aclippy::assigning_clones\x1f-Aclippy::default_trait_access\x1f-Aclippy::unusual_byte_groupings\x1f-Aclippy::doc_link_with_quotes\x1f-Aclippy::unnecessary_get_then_check\x1f-Aclippy::implicit_hasher\x1f-Aclippy::return_self_not_must_use\x1f-Aclippy::wildcard_imports"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  test:
    name: Test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features

  doc-audit:
    name: Docs & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Security audit
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: License and advisory check
        run: cargo deny check

  # Snapshot: build and push dev-<sha> multi-arch image on every green
  # dev push. Each platform builds natively (no QEMU), then a merge job
  # creates the multi-arch manifest. Concurrency control cancels stale builds.
  snapshot-build:
    name: Snapshot (${{ matrix.arch }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [lint, test, doc-audit]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/selenedb

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEATURES=federation,vector,search,cloud-storage,rdf,rdf-sparql
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          outputs: type=image,"name=ghcr.io/${{ github.repository_owner }}/selenedb",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  snapshot-merge:
    name: Snapshot manifest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: snapshot-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/selenedb
          tags: |
            type=sha,prefix=dev-

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/selenedb@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect $(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
