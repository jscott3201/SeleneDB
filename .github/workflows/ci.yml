name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml which sets -Ctarget-cpu=native (for local
  # Override only the CPU tuning from .cargo/config.toml in CI. This keeps
  # the shared lint configuration in one place while avoiding host-specific
  # instructions from -Ctarget-cpu=native on GitHub-hosted runners.
  CARGO_ENCODED_RUSTFLAGS: "-Ctarget-cpu=x86-64"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  test:
    name: Test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /
      - name: Run tests
        # Limit parallelism to avoid OOM bus errors on 7 GB runners when
        # linking selene-server (candle + tantivy + arrow all unconditional).
        run: cargo test --workspace --all-features -j2

  doc-audit:
    name: Docs & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Security audit
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.0 --locked
      - name: License and advisory check
        run: cargo deny check

  # Docker snapshot builds moved to .github/workflows/snapshot.yml
  # (workflow_dispatch). Trigger manually when a dev image is needed.
