# Docker Compose — development mode with all services enabled.
#
#   docker compose -f docker-compose.dev.yml up -d
#
services:
  selene:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--dev", "--data-dir", "/data"]
    ports:
      - "4510:4510/udp"
      - "8080:8080"
    volumes:
      - selene-data:/data
    environment:
      - RUST_LOG=selene_server=info
      - SELENE_PROFILE=standalone
      - SELENE_SERVICES_MCP_ENABLED=true
    healthcheck:
      test: ["CMD", "/selene", "health", "--http"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  selene-data:
