# Cloud Build configuration for SeleneDB GPU image.
#
# Builds and pushes to Artifact Registry. Requires:
#   1. HF token stored as a Secret Manager secret named 'hf-token'
#   2. Artifact Registry repository (created by gcp-deploy.sh)
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml
#
# Or with substitution overrides:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=selene

substitutions:
  _REGION: us-central1
  _REPO: selene
  _IMAGE: selene-server
  _TAG: latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  diskSizeGb: '100'
  env:
    - DOCKER_BUILDKIT=1

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hf-token/versions/latest
      env: HF_TOKEN

steps:
  # Build the GPU image with CUDA support and embedded model
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        echo "$$HF_TOKEN" > /workspace/.hf_token
        docker build \
          -f Dockerfile.gpu \
          --secret id=hf_token,src=/workspace/.hf_token \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:gpu-${_TAG} \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:gpu-latest \
          .
        rm -f /workspace/.hf_token
    secretEnv:
      - HF_TOKEN

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:gpu-${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:gpu-latest

timeout: 3600s
